<svg viewBox="0 0 500 250" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="25" text-anchor="middle" font-size="16" font-weight="bold">Photosynthesis Process</text>

  <!-- Inputs box -->
  <rect x="20" y="60" width="100" height="80" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" rx="5"/>
  <text x="70" y="80" text-anchor="middle" font-size="12" font-weight="bold">Inputs</text>
  <text x="70" y="100" text-anchor="middle" font-size="11">CO₂</text>
  <text x="70" y="120" text-anchor="middle" font-size="11">H₂O</text>
  <text x="70" y="140" text-anchor="middle" font-size="11">Light</text>

  <!-- Arrow -->
  <path d="M 130 100 L 170 100" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Process box -->
  <rect x="180" y="60" width="140" height="80" fill="#FFF3E0" stroke="#E65100" stroke-width="2" rx="5"/>
  <text x="250" y="80" text-anchor="middle" font-size="12" font-weight="bold">Photosynthesis</text>
  <text x="250" y="100" text-anchor="middle" font-size="10">(Light Dependent)</text>
  <text x="250" y="115" text-anchor="middle" font-size="10">(Light Independent)</text>
  <text x="250" y="130" text-anchor="middle" font-size="10">in Chloroplasts</text>

  <!-- Arrow -->
  <path d="M 330 100 L 370 100" stroke="#333" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Outputs box -->
  <rect x="380" y="60" width="100" height="80" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2" rx="5"/>
  <text x="430" y="80" text-anchor="middle" font-size="12" font-weight="bold">Outputs</text>
  <text x="430" y="100" text-anchor="middle" font-size="11">Glucose</text>
  <text x="430" y="120" text-anchor="middle" font-size="11">O₂</text>

  <!-- Equation -->
  <text x="250" y="190" text-anchor="middle" font-size="12" font-weight="bold">6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂</text>

  <!-- Location info -->
  <rect x="80" y="210" width="340" height="30" fill="#F0F0F0" stroke="#666" stroke-width="1" rx="3"/>
  <text x="250" y="230" text-anchor="middle" font-size="11">Location: Thylakoid membrane (light dependent), Stroma (light independent)</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>